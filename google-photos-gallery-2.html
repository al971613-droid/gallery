<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>내 갤러리</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0c;color:#e8e8f0;font-family:sans-serif;min-height:100vh}
    header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid #1e1e26;background:rgba(10,10,12,.95);position:sticky;top:0;z-index:10}
    .logo{color:#c8f04a;font-weight:700}
    #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:1.5rem;text-align:center;padding:2rem}
    button.login{background:#c8f04a;color:#0a0a0c;border:none;border-radius:12px;padding:.9rem 2.2rem;font-size:1rem;font-weight:700;cursor:pointer}
    #loading{display:none;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:1rem}
    .spinner{width:36px;height:36px;border:3px solid #1e1e26;border-top-color:#c8f04a;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
    #gallery-screen{display:none}
    #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:3px;padding:.5rem}
    .photo{aspect-ratio:1;overflow:hidden;border-radius:4px;cursor:pointer;background:#16161a;animation:fadeIn .3s ease both}
    .photo img{width:100%;height:100%;object-fit:cover;display:block}
    #more-btn{display:none;margin:1rem auto 3rem;background:transparent;border:1px solid #7b6cf6;border-radius:10px;color:#7b6cf6;padding:.65rem 1.8rem;font-size:.85rem;cursor:pointer}
    #lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);align-items:center;justify-content:center;flex-direction:column;z-index:100;padding:1rem;gap:.8rem}
    #lightbox.open{display:flex}
    #lightbox img{max-width:92vw;max-height:82vh;border-radius:8px;object-fit:contain}
    #error-screen{display:none;text-align:center;padding:4rem;color:#ff6b6b}
    .logout{background:transparent;border:1px solid #2a2a32;border-radius:8px;color:#888;padding:.35rem .8rem;font-size:.72rem;cursor:pointer;display:none}
    .count{padding:.8rem 1rem;font-size:.75rem;color:#444}
  </style>
</head>
<body>
<header>
  <div class="logo">📷 my gallery</div>
  <div style="display:flex;align-items:center;gap:.8rem">
    <span id="user-email" style="font-size:.75rem;color:#555"></span>
    <button class="logout" id="logout-btn" onclick="signOut()">로그아웃</button>
  </div>
</header>

<div id="login-screen">
  <div style="font-size:4rem">🖼️</div>
  <h1 style="font-size:1.2rem">내 구글 포토 갤러리</h1>
  <p style="font-size:.85rem;color:#555;line-height:1.8">구글 계정으로 로그인하면<br>사진을 바로 볼 수 있어</p>
  <button class="login" id="login-btn">🔐 Google로 로그인</button>
</div>

<div id="loading"><div class="spinner"></div><div style="color:#555;font-size:.85rem">사진 불러오는 중...</div></div>
<div id="error-screen"><div style="font-size:2rem;margin-bottom:1rem">⚠️</div><div id="error-msg"></div><button class="login" style="margin-top:1rem" onclick="init()">다시 시도</button></div>
<div id="gallery-screen"><div class="count" id="count"></div><div id="grid"></div><button id="more-btn" onclick="loadMore()">더 보기</button></div>
<div id="lightbox" onclick="closeLightbox()"><img id="lb-img" src="" onclick="event.stopPropagation()"><div style="font-size:.7rem;color:#333;margin-top:.5rem">탭하면 닫혀</div></div>

<script>
const CLIENT_ID='818840851845-528fluo5nkm4o1javu367ieg68tm7f3l.apps.googleusercontent.com';
let tokenClient,accessToken,nextPageToken,allPhotos=[];

function init(){
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,
    scope:'https://www.googleapis.com/auth/photoslibrary.readonly https://www.googleapis.com/auth/userinfo.email',
    prompt:'consent',
    callback:async(resp)=>{
      if(resp.error){showError(resp.error);return;}
      accessToken=resp.access_token;
      const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+accessToken}});
      const d=await r.json();
      document.getElementById('user-email').textContent=d.email||'';
      document.getElementById('logout-btn').style.display='block';
      await loadPhotos(true);
    }
  });
  document.getElementById('login-btn').onclick=()=>tokenClient.requestAccessToken();
}

function signOut(){
  google.accounts.oauth2.revoke(accessToken);
  accessToken=null;allPhotos=[];nextPageToken=null;
  document.getElementById('grid').innerHTML='';
  document.getElementById('user-email').textContent='';
  document.getElementById('logout-btn').style.display='none';
  show('login-screen');
}

async function loadPhotos(fresh){
  show('loading');
  const url='https://photoslibrary.googleapis.com/v1/mediaItems?pageSize=50'+((!fresh&&nextPageToken)?'&pageToken='+nextPageToken:'');
  const r=await fetch(url,{headers:{Authorization:'Bearer '+accessToken}});
  const d=await r.json();
  if(d.error){showError(d.error.message);return;}
  const items=(d.mediaItems||[]).filter(i=>i.mimeType?.startsWith('image'));
  if(fresh){allPhotos=items;document.getElementById('grid').innerHTML='';}
  else allPhotos=allPhotos.concat(items);
  nextPageToken=d.nextPageToken||null;
  const grid=document.getElementById('grid');
  items.forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='photo';div.style.animationDelay=(i*.03)+'s';
    div.innerHTML='<img src="'+p.baseUrl+'=w200-h200-c" loading="lazy">';
    div.onclick=()=>{document.getElementById('lb-img').src=p.baseUrl+'=w1200-h1200';document.getElementById('lightbox').classList.add('open');};
    grid.appendChild(div);
  });
  document.getElementById('count').textContent=allPhotos.length+'장 로드됨';
  document.getElementById('more-btn').style.display=nextPageToken?'block':'none';
  show('gallery-screen');
}

function loadMore(){loadPhotos(false);}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
function show(id){['login-screen','loading','gallery-screen','error-screen'].forEach(s=>{const el=document.getElementById(s);el.style.display=s===id?(s==='loading'?'flex':'block'):'none';});}
function showError(msg){document.getElementById('error-msg').textContent='오류: '+msg;show('error-screen');}
</script>
<script src="https://accounts.google.com/gsi/client" onload="init()"></script>
</body>
</html>
